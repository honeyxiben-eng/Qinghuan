# ============================================
# TreeNB - 腾讯云生产部署 (HTTP Only)
# 包含: Next.js App + Nginx 反向代理
# ============================================

services:
  app:
    build: .
    container_name: saltlake-app
    restart: always
    ports:
      - "127.0.0.1:3456:3456"
    volumes:
      - saltlake-data:/app/prisma
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-saltlake-jwt-change-me}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL:-}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
    networks:
      - saltlake-net

  nginx:
    image: nginx:alpine
    container_name: saltlake-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./public:/usr/share/nginx/static:ro
    depends_on:
      - app
    networks:
      - saltlake-net

volumes:
  saltlake-data:
    driver: local

networks:
  saltlake-net:
    driver: bridge
